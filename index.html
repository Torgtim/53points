<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fang Ballene!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin: 0;
            overflow: hidden;
        }
        #ui {
            font-size: 24px;
            margin-top: 10px;
        }
        canvas {
            background-color: #111;
            display: block;
            margin: 20px auto;
            border: 2px solid #008CBA;
        }
    </style>
</head>
<body>

    <div id="ui">Poeng: <span id="score">0</span> / 53</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        let score = 0;
        
        // Kurv (spiller)
        const basket = {
            x: 175,
            y: 460,
            width: 60,
            height: 15,
            color: "#008CBA"
        };

        // Ball
        const ball = {
            x: Math.random() * (canvas.width - 20) + 10,
            y: 0,
            radius: 10,
            speed: 4,
            color: "#ff4757"
        };

        // Styring med mus
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left - basket.width / 2;
            
            // Hold kurven innenfor skjermen
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
        });

        // Styring med berøring (mobil)
        canvas.addEventListener("touchmove", (e) => {
            const rect = canvas.getBoundingClientRect();
            basket.x = e.touches[0].clientX - rect.left - basket.width / 2;
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
        });

        function update() {
            // Flytt ballen nedover
            ball.y += ball.speed;

            // Sjekk om ballen treffer bunnen (bom)
            if (ball.y > canvas.height) {
                resetBall();
            }

            // Sjekk kollisjon med kurven
            if (ball.y + ball.radius >= basket.y && 
                ball.x >= basket.x && 
                ball.x <= basket.x + basket.width) {
                
                score++;
                scoreDisplay.textContent = score;
                resetBall();

                // Øk farten litt etter hvert som man får poeng
                ball.speed += 0.2;

                // Sjekk vinnerscore
                if (score === 53) {
                    window.location.href = "https://rickroll.it";
                    return;
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function resetBall() {
            ball.y = 0;
            ball.x = Math.random() * (canvas.width - 20) + 10;
        }

        function draw() {
            // Tøm canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Tegn kurv
            ctx.fillStyle = basket.color;
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

            // Tegn ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
        }

        // Start spillet
        update();
    </script>

</body>
</html>
